// Файл: build.gradle (Project: FixList)
buildscript {
    ext {
        agp_version = '8.13.2'
        room_version = '2.6.1'
        lifecycle_version = '2.7.0'
        material_version = '1.11.0'
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:$agp_version"
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}